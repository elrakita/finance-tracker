<app-account-form-layout 
  [accountForm]="accountForm" 
  [formGroup]="accountForm"
  class="edit-container">
    <h2>Edit Account</h2>
    <p>Add a new financial account to track your money</p>
      <div class="form-group">
        
        <label for="name" class="form-label">
          <span class="label-icon">📝</span>
          Account Name *
        </label>
        <div class="input-wrapper">
          <input
            type="text"
            id="name"
            class="form-input"
            formControlName="name"
            placeholder="e.g., Chase Checking"
            [class.error]="accountForm.get('name')?.invalid && accountForm.get('name')?.touched">
        </div>
        @if (accountForm.get('name')?.invalid && accountForm.get('name')?.touched) {
          <div class="error-text">
            <span class="error-icon">⚠️</span>
            {{ getErrorMessage('name') }}
          </div>
        }
      </div>

      <div class="form-group">
        <label for="type" class="form-label">
          <span class="label-icon">🏦</span>
          Account Type *
        </label>
        <div class="input-wrapper">
          <select
            id="type"
            class="form-select"
            formControlName="type"
            [class.error]="accountForm.get('type')?.invalid && accountForm.get('type')?.touched">
            <option value="">Select account type</option>
            @for (type of accountTypes; track type.value) {
              <option [value]="type.value">{{ type.label }}</option>
            }
          </select>
        </div>
        
      </div> 
      <mat-dialog-actions align="end">
        <button class="btn-primary" (click)="cancel()">Cancel</button>
        <button class="btn-primary" (click)="save()" [disabled]="accountForm.invalid">Save Changes</button>
    </mat-dialog-actions>
</app-account-form-layout>
