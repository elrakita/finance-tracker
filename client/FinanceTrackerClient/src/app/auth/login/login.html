<div class="auth-page-wrapper">
  <div class="form-card">
    <div class="card-header">
      <h2>Welcome Back</h2>
      <p>Log in to access your financial dashboard</p>
    </div>

    <div class="card-content">
      @if (errorMessage) {
        <div class="error-message">
          <div class="alert error">
            <div class="alert-icon">❌</div>
            <div class="alert-content"><p>{{ errorMessage }}</p></div>
          </div>
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label"><span class="label-icon">📧</span> Email Address</label>
          <input type="email" class="form-input" formControlName="email" placeholder="email@example.com">
        </div>

        <div class="form-group">
          <label class="form-label"><span class="label-icon">🔒</span> Password</label>
          <input type="password" class="form-input" formControlName="password" placeholder="••••••••">
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading || loginForm.invalid">
            <span class="btn-icon">{{ isLoading ? '⏳' : '🔑' }}</span>
            <span>{{ isLoading ? 'Logging in...' : 'Sign In' }}</span>
          </button>
        </div>

        <div class="auth-footer">
          <span>New here? </span>
          <a routerLink="/register">Create an account</a>
        </div>
      </form>
    </div>
  </div>
</div>
