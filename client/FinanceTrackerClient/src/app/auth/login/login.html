<div class="auth-page-wrapper">
  <mat-card class="form-card" appearance="outlined">
    <mat-card-header class="card-header">
      <mat-card-title>Welcome Back</mat-card-title>
      <mat-card-subtitle>Log in to access your financial dashboard</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="card-content">
      @if (errorMessage) {
        <div class="alert error">
          <mat-icon>error</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Email Address</mat-label>
          <mat-icon matPrefix>email</mat-icon>
          <input matInput type="email" formControlName="email" placeholder="email@example.com">
          <mat-error>Please enter a valid email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput type="password" formControlName="password" placeholder="••••••••">
          <mat-error>Password is required</mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" class="w-100" 
                [disabled]="isLoading || loginForm.invalid">
          <mat-icon>{{ isLoading ? 'hourglass_empty' : 'login' }}</mat-icon>
          {{ isLoading ? 'Logging in...' : 'Sign In' }}
        </button>

        <div class="auth-footer">
          <p>New here? <a routerLink="/register">Create an account</a></p>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
