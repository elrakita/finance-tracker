@if (isLoggedIn) {
  <header class="main-nav">
    <div class="nav-content">
      <div class="nav-left">
        <div class="brand-wrapper" routerLink="/accounts">
          <div class="brand-logo">
            <span class="logo-inner">FT</span>
          </div>
          <span class="brand-text">
            Finance<span class="text-highlight">Tracker</span>
          </span>
        </div>
      </div>
      <div class="nav-actions">
        <button class="settings-btn" [matMenuTriggerFor]="settingsMenu">
          <mat-icon>settings</mat-icon>
          Settings
        </button>

        <button class="settings-btn" (click)="onLogout()">
          <mat-icon>logout</mat-icon>
          Log Out
        </button>
      </div>
    </div>
  </header>

  <mat-menu #settingsMenu="matMenu" class="beige-settings-menu">
    <button mat-menu-item routerLink="/categories">
      <mat-icon>category</mat-icon>
      <span class="menu-item">Manage Categories</span>
    </button>
  </mat-menu>
}

<main>
  <router-outlet />
</main>
